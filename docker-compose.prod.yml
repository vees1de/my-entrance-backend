services:
  db:
    image: postgres:16-alpine
    container_name: my-entrance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myentrance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-my_entrance}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - my_entrance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myentrance} -d ${POSTGRES_DB:-my_entrance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-entrance-api:latest
    container_name: my-entrance-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-myentrance}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-my_entrance}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      APP_URL: ${APP_URL:-https://bims.su/api}
      FRONTEND_URL: ${FRONTEND_URL:-https://bims.su}
      PORT: 3000
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      THROTTLE_TTL: ${THROTTLE_TTL:-3600}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-5}
    volumes:
      - my_entrance_uploads:/app/uploads
    ports:
      - "127.0.0.1:3010:3000"

volumes:
  my_entrance_pgdata:
  my_entrance_uploads:
