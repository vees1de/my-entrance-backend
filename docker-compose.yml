services:
  db:
    image: postgres:16-alpine
    container_name: my-entrance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_entrance
    ports:
      - "5432:5432"
    volumes:
      - my_entrance_pgdata:/var/lib/postgresql/data

volumes:
  my_entrance_pgdata:
